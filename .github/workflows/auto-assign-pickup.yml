name: Auto-assign on pickup

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign:
    if: github.event.label.name == 'in-progress'
    runs-on: ubuntu-latest
    steps:
      - name: Assign actor to issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-assignee ${{ github.actor }}
